<div class="container">
<button onclick="agregar('Cambio de aceite',800)">Cambio aceite $800</button>
<button onclick="agregar('Afinación',1500)">Afinación $1500</button>
<button onclick="agregar('Frenos',2000)">Frenos $2000</button>

<script>
let carrito=JSON.parse(localStorage.getItem("carrito"))||[]
function agregar(s,p){
 carrito.push({s,p})
 localStorage.setItem("carrito",JSON.stringify(carrito))
 alert("Agregado al carrito")
}
</script>
