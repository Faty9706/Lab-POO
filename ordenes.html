<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Órdenes registradas</h1></header>

<nav>
  <a href="dashboard.html">Inicio</a>
  <a href="registrar.html">Nueva Orden</a>
</nav>

<div class="container-large">

<table border="1" width="100%" id="tabla">
<tr>
<th>Cliente</th>
<th>Servicio</th>
<th>Costo</th>
<th>Teléfono</th>
<th>Acción</th>
</tr>
</table>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
const supabase = createClient("https://eexxczsqyeuyvtahvktj.supabase.co","sb_publishable_zKjJS82J3SNS5_oImGT-Lg_NQIISEFu")

async function cargar(){
 const { data } = await supabase.from("ordenes").select("*")

 data.forEach(o=>{
   tabla.innerHTML += `
   <tr>
     <td>${o.nombre}</td>
     <td>${o.servicio}</td>
     <td>$${o.costo}</td>
     <td>${o.telefono}</td>
     <td><button onclick="eliminar(${o.id})">Eliminar</button></td>
   </tr>`
 })
}

async function eliminar(id){

  if(!confirm("¿Eliminar esta orden?")) return

  const { error } = await supabase
    .from("ordenes")
    .delete()
    .eq("id", id)

  if(error){
    alert("Error al eliminar")
    console.log(error)
  }else{
    alert("Orden eliminada")
    location.reload()
  }
}

window.eliminar = eliminar
cargar()

</script>

</body>
</html>
