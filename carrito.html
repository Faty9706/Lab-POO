<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carrito</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tu carrito 🛒</h1>

<ul id="listaCarrito"></ul>
<div class="total-box">
      <span id="total">$0</span>
</div>

<button onclick="confirmarCompra()">Confirmar compra</button>
<button onclick="window.location='tienda.html'">Volver a tienda</button>

<div id="datosCliente" style="display:none">
  <h2>Datos del cliente</h2>
  <input id="clienteNombre" placeholder="Nombre">
  <input id="clienteTelefono" placeholder="Teléfono">
  <button onclick="finalizarCompra()">Finalizar compra</button>
</div>

<!-- CHAT -->
<div class="chatBtn" onclick="toggleChat()">💬</div>
<div id="chatBox" class="chatBox">
  <div class="chatHeader">Asistente</div>
  <div id="chatMensajes" class="chatMensajes"></div>
  <input id="mensajeInput">
  <button onclick="enviarMensaje()">Enviar</button>
</div>

<script src="script.js"></script>
</body>
</html>
