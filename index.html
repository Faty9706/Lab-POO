<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Taller AutoFix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-bg">

  <div class="login-card">
    <h1>Taller AutoFix 🚗</h1>
    <p>Inicia sesión para continuar</p>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <div class="info">
      <p><b>Cliente:</b> cliente / 1234</p>
      <p><b>Admin:</b> admin / 1234</p>
    </div>
  </div>

</div>

<script>
function login(){
  const u = document.getElementById("user").value
  const p = document.getElementById("pass").value

  if(u=="admin" && p=="1234"){
    window.location="dashboard.html"
  }
  else if(u=="cliente" && p=="1234"){
    window.location="tienda.html"
  }
  else{
    alert("Datos incorrectos")
  }
}
</script>
<!-- BOTÓN FLOTANTE -->
<div id="chat-boton" onclick="abrirChat()">💬</div>

<!-- VENTANA -->
<div id="chat-ventana">
  <div id="chat-header">
    Soporte AutoFix <span onclick="cerrarChat()">✖</span>
  </div>

  <div id="chat-mensajes"></div>

  <div id="chat-input">
    <input id="chatInput" placeholder="Escribe mensaje...">
    <button onclick="enviarMensaje()">Enviar</button>
  </div>
</div>
<!-- ===== TIENDA ===== -->
<section id="tienda">
  <h2>Servicios disponibles</h2>

  <div class="producto">
    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
    <h3>Cambio de aceite</h3>
    <p>$500</p>
    <button onclick="agregarCarrito('Cambio de aceite',500)">Agregar</button>
  </div>

  <div class="producto">
    <img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
    <h3>Alineación</h3>
    <p>$300</p>
    <button onclick="agregarCarrito('Alineación',300)">Agregar</button>
  </div>

  <div class="producto">
    <img src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png">
    <h3>Diagnóstico</h3>
    <p>$250</p>
    <button onclick="agregarCarrito('Diagnóstico',250)">Agregar</button>
  </div>

  <br><br>
  <button onclick="verCarrito()">🛒 Ver carrito</button>
</section>
<!-- ===== CARRITO ===== -->
<section id="carrito" style="display:none">
  <h2>Tu carrito</h2>
  <ul id="listaCarrito"></ul>
  <h3 id="total"></h3>

  <button onclick="volverTienda()">⬅ Volver a tienda</button>
  <button onclick="confirmarCompra()">Confirmar compra</button>
</section>
</body>
</html>
