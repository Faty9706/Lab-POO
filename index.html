<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Taller AutoFix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-bg">

  <div class="login-card">
    <h1>Taller AutoFix 🚗</h1>
    <p>Inicia sesión para continuar</p>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <div class="info">
      <p><b>Cliente:</b> cliente / 1234</p>
      <p><b>Admin:</b> admin / 1234</p>
    </div>
  </div>

</div>

<script>
function login(){
  const u = document.getElementById("user").value
  const p = document.getElementById("pass").value

  if(u=="admin" && p=="1234"){
    window.location="dashboard.html"
  }
  else if(u=="cliente" && p=="1234"){
    window.location="tienda.html"
  }
  else{
    alert("Datos incorrectos")
  }
}
</script>
<!-- BOTON CHAT -->
<div id="chat-boton" onclick="abrirChat()">💬</div>

<!-- VENTANA CHAT -->
<div id="chat-ventana">
  <div class="chat-header">
    Asistente 🤖
    <span onclick="cerrarChat()">✖</span>
  </div>

  <div id="chat-mensajes"></div>

  <div class="chat-input">
    <input id="chatInput" placeholder="Escribe algo...">
    <button onclick="enviarMensaje()">Enviar</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
</body>
</html>
